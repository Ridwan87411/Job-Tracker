<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Application Tracker</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{background:#f6f8fb}
  </style>
</head>

<body class="max-w-5xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-6">Job Application Tracker</h1>

<div class="grid grid-cols-3 gap-4 mb-8">
  <div class="bg-white rounded-xl shadow-sm p-4">
    <p class="text-sm text-gray-500">Total</p>
    <h2 id="totalCount" class="text-2xl font-bold">8</h2>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-4">
    <p class="text-sm text-emerald-600">Interview</p>
    <h2 id="interviewCount" class="text-2xl font-bold text-emerald-600">0</h2>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-4">
    <p class="text-sm text-red-600">Rejected</p>
    <h2 id="rejectedCount" class="text-2xl font-bold text-red-600">0</h2>
  </div>
</div>

<div class="bg-white p-5 rounded-xl shadow-sm">

  <div class="flex justify-between items-center mb-4">
    <h2 class="font-bold">Available Jobs</h2>
    <p class="text-sm text-gray-500">
      <span id="tabCount">8</span> jobs
    </p>
  </div>

  <div class="flex gap-2 mb-6">
    <button class="tabBtn px-4 py-1.5 rounded-md bg-blue-600 text-white text-sm" data-tab="all">All</button>
    <button class="tabBtn px-4 py-1.5 rounded-md bg-slate-100 text-slate-600 text-sm" data-tab="interview">Interview</button>
    <button class="tabBtn px-4 py-1.5 rounded-md bg-slate-100 text-slate-600 text-sm" data-tab="rejected">Rejected</button>
  </div>

  <div id="jobList" class="space-y-4">


</body>
</html>
